<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Realtime DEMO</title>
    <link rel="icon" type="image/x-icon" href="/firebase-favicon.png">
    <style>
      .app-shell { max-width: 900px; width: 100%; }
      .music-card { word-break: break-word; border: 1px solid #dee2e6; border-radius: 0.75rem; background: #ffffff; box-shadow: 0 0.2rem 0.6rem rgba(0, 0, 0, 0.04); }
      .music-card strong { display: block; margin-bottom: 0.25rem; font-size: 0.95rem; }
      .navbar-brand { font-size: 1.05rem; }
      @media (max-width: 576px) {
        .btn { font-size: 0.95rem; padding: 0.7rem 0.8rem; }
        .navbar-brand { font-size: 1rem; }
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="app-shell mx-auto" style="max-width: 900px;">
        <nav class="navbar bg-body-tertiary rounded-3 mb-4">
          <div class="container-fluid">
            <h3 class="navbar-brand mb-0">Firebase Realtime Database v2.5</h3>
          </div>
        </nav>

        <form class="bg-white p-4 rounded-3 shadow-sm">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="formId">Identificador</label>
              <div class="input-group">
                <span class="input-group-text" id="inputGroup-sizing-default">ID</span>
                <input type="text" class="form-control" id="formId" aria-label="Identificador" aria-describedby="inputGroup-sizing-default" required>
                <button type="button" class="btn btn-outline-success" id="btBuscar">Buscar</button>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label" for="formArtista">Artista</label>
              <input type="text" class="form-control" id="formArtista" aria-label="Artista">
            </div>
            <div class="col-12">
              <label class="form-label" for="formTitulo">Título</label>
              <input type="text" class="form-control" id="formTitulo" aria-label="Título">
            </div>
            <div class="col-12">
              <div class="d-grid gap-2 d-sm-flex justify-content-center">
                <button type="button" class="btn btn-success flex-fill flex-sm-grow-0" id="btGravar">gravar</button>
                <button type="button" class="btn btn-warning flex-fill flex-sm-grow-0" id="btEdit">atualizar</button>
                <button type="button" class="btn btn-danger flex-fill flex-sm-grow-0" id="btExcluir">excluir</button>
                <button type="button" class="btn btn-secondary flex-fill flex-sm-grow-0" id="limpar">limpar</button>
              </div>
            </div>
          </div>
        </form>

        <section id="musicaCards" class="mt-4">
          <nav class="navbar bg-body-tertiary rounded-3">
            <h3 class="navbar-brand mb-0">Músicas cadastradas</h3>
          </nav>
          <div id="musicaListContainer" class="mt-3"></div>
        </section>
      </div>
    </div>

    <script type="module" src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/1a8c4ad845.js" crossorigin="anonymous"></script>
  </body>
</html>
